<!DOCTYPE html>
<html>
<head>
    <title>Hello World Example</title>

    <script>
        function showMessage() {
            var element = document.getElementById("message");
            element.outerHTML = "<h2>Hello, world!</h2>";
        }
    </script>

</head>
<body>


<p id="message">Click the button to display the message.</p>

<button onclick="showMessage()">Click Me</button>

<p>J. NANDHA KISHOR</p>
</body>
</html>
