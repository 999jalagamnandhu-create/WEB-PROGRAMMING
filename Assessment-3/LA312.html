<!DOCTYPE html>
<html>
<head>
<title>Job Skills Form</title>
</head>
<body>

<h2>Select Your Job Skills</h2>

<form id="skillForm">

<input type="checkbox" name="skills" value="Java"> Java<br>
<input type="checkbox" name="skills" value="Python"> Python<br>
<input type="checkbox" name="skills" value="JavaScript"> JavaScript<br>
<input type="checkbox" name="skills" value="C++"> C++<br>
<input type="checkbox" name="skills" value="HTML/CSS"> HTML/CSS<br><br>

<button type="button" onclick="validateSkills()">Submit</button>

<p id="result"></p>

</form>

<script>
function validateSkills()
{
    let skills = document.getElementsByName("skills");
    let selected = [];

    for(let i = 0; i < skills.length; i++)
    {
        if(skills[i].checked)
        {
            selected.push(skills[i].value);
        }
    }

    if(selected.length < 3)
    {
        document.getElementById("result").innerHTML = 
        "Error: Please select at least 3 skills.";
    }
    else
    {
        document.getElementById("result").innerHTML = 
        "Selected Skills: " + selected.join(", ");
    }
}
</script>

</html>
