<!DOCTYPE html>
<html>
<head>
<title>Text Styling Application</title>

<style>
.bold {
    font-weight: bold;
}

.italic {
    font-style: italic;
}

.smallcaps {
    font-variant: small-caps;
}
</style>

</head>
<body>

<h2>Text Styling Application</h2>

<p id="message">This is a sample message for styling.</p>

<form>

<fieldset>
<legend>Apply Styles</legend>

<button type="button" onclick="applyBold()">Bold</button>
<button type="button" onclick="applyItalic()">Italic</button>
<button type="button" onclick="applySmallCaps()">Small Caps</button>
<button type="button" onclick="applyAll()">All Styles</button>

</fieldset>

</form>

<script>

function applyBold() {
    document.getElementById("message").className = "bold";
}

function applyItalic() {
    document.getElementById("message").className = "italic";
}

function applySmallCaps() {
    document.getElementById("message").className = "smallcaps";
}

function applyAll() {
    document.getElementById("message").className = "bold italic smallcaps";
}

</script>
<p>24BKT0129</p>
<p>J. NANDHA KISHOR</p>
</body>
</html>
