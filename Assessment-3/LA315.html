<!DOCTYPE html>
<html>
<head>
<title>Font Customization Tool</title>
</head>
<body>

<h2>Dynamic Font Customization Tool</h2>

<p id="text">Customize this text using the controls below.</p>

<form>

<fieldset>
<legend>Font Size</legend>
<input type="range" id="size" min="10" max="50" value="16" oninput="changeSize()">
</fieldset>

<br>

<fieldset>
<legend>Text Color</legend>
<input type="color" id="color" onchange="changeColor()">
</fieldset>

<br>

<fieldset>
<legend>Background Color</legend>
<input type="color" id="bgcolor" onchange="changeBackground()">
</fieldset>

</form>

<script>

function changeSize()
{
    let size = document.getElementById("size").value;
    document.getElementById("text").style.fontSize = size + "px";
}

function changeColor()
{
    let color = document.getElementById("color").value;
    document.getElementById("text").style.color = color;
}

function changeBackground()
{
    let bg = document.getElementById("bgcolor").value;
    document.getElementById("text").style.backgroundColor = bg;
}

</script>
<p>24BKT0129</p>
<p>J. NANDHA KISHOR</p>
</body>
</html>
