<!DOCTYPE html>
<html>
<head>
<title>Multiplication Table</title>
</head>
<body>

<h2>Multiplication Table using Do-While Loop</h2>

Enter a number:
<input type="number" id="num">

<button onclick="printTable()">Show Table</button>

<p id="result"></p>

<script>
function printTable() 
{
    let n = document.getElementById("num").value;
    let i = 1;
    let output = "";

    do 
    {
        output += n + " × " + i + " = " + (n * i) + "<br>";
        i++;
    } 
    while (i <= 10);

    document.getElementById("result").innerHTML = output;
}
</script>

</body>
</html>
