<!DOCTYPE html>
<html>
<head>
  <title>React Grade Calculator</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .container {
      width: 320px;
      margin: 100px auto;
      padding: 20px;
      border: 2px solid #333;
      border-radius: 10px;
      text-align: center;
      background-color: #f4f4f4;
      font-family: Arial;
    }

    input {
      width: 80%;
      padding: 8px;
      margin: 8px 0;
    }

    button {
      padding: 10px 15px;
      margin-top: 10px;
      background-color: #27ae60;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #1e8449;
    }

    h2 {
      color: #2c3e50;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function GradeCalculator() {
      const [m1, setM1] = useState("");
      const [m2, setM2] = useState("");
      const [m3, setM3] = useState("");
      const [avg, setAvg] = useState(0);
      const [grade, setGrade] = useState("");

      const calculateGrade = () => {
        const average = (Number(m1) + Number(m2) + Number(m3)) / 3;
        setAvg(average.toFixed(2));

        if (average >= 90) setGrade("A+");
        else if (average >= 75) setGrade("A");
        else if (average >= 60) setGrade("B");
        else if (average >= 50) setGrade("C");
        else setGrade("F");
      };

      return (
        <div className="container">
          <h2>Grade Calculator</h2>

          <input type="number" value={m1} onChange={(e) => setM1(e.target.value)} placeholder="Subject 1" />
          <input type="number" value={m2} onChange={(e) => setM2(e.target.value)} placeholder="Subject 2" />
          <input type="number" value={m3} onChange={(e) => setM3(e.target.value)} placeholder="Subject 3" />

          <button onClick={calculateGrade}>Calculate</button>

          <h2>Average: {avg}</h2>
          <h2>Grade: {grade}</h2>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<GradeCalculator />);
  </script>
<p>24BKT0129</p>
<p>J. NANDHA KISHOR</p>
</body>
</html>
