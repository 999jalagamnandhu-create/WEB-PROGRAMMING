<!DOCTYPE html>
<html>
<head>
  <title>Book Explorer</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
    }

    .container {
      width: 90%;
      margin: 20px auto;
    }

    input {
      padding: 8px;
      width: 60%;
      margin-right: 5px;
    }

    button {
      padding: 8px 12px;
      background: #3498db;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #2980b9;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      margin-top: 20px;
    }

    .card {
      width: 200px;
      padding: 10px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.2);
      text-align: left;
    }

    img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    h1 {
      color: #2c3e50;
    }

    h3 {
      margin: 5px 0;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function fetchBooks(query) {
      return fetch(`https://www.googleapis.com/books/v1/volumes?q=${query}`)
        .then(res => res.json())
        .then(data => data.items || []);
    }

    function Header() {
      return <h1>Book Explorer</h1>;
    }

    function Search({ query, setQuery, handleSearch }) {
      return (
        <div>
          <input
            type="text"
            value={query}
            onChange={(e) => setQuery(e.target.value)}
            placeholder="Search books..."
          />
          <button onClick={handleSearch}>Search</button>
        </div>
      );
    }

    function BookCard({ book }) {
      const info = book.volumeInfo;

      return (
        <div className="card">
          <img src={info.imageLinks?.thumbnail || ""} />
          <h3>{info.title}</h3>
          <p>Author: {info.authors?.join(", ") || "N/A"}</p>
          <p>Publisher: {info.publisher || "N/A"}</p>
          <p>Year: {info.publishedDate || "N/A"}</p>
        </div>
      );
    }

    function BookList({ books }) {
      return (
        <div className="grid">
          {books.map((book, index) => (
            <BookCard key={index} book={book} />
          ))}
        </div>
      );
    }

    function App() {
      const [query, setQuery] = useState("");
      const [books, setBooks] = useState([]);

      const handleSearch = () => {
        if (query !== "") {
          fetchBooks(query).then(data => setBooks(data));
        }
      };

      return (
        <div className="container">
          <Header />
          <Search query={query} setQuery={setQuery} handleSearch={handleSearch} />
          <BookList books={books} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
<p>24BKT0129</p>
<p>J. NANDHA KISHOR</p>
</body>
</html>
